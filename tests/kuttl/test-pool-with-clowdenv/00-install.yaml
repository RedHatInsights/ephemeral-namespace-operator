---
apiVersion: v1
kind: Namespace
metadata:
  name: ephemeral-base
---
apiVersion: cloud.redhat.com/v1alpha1
kind: NamespacePool
metadata:
  name: test-with-clowdenv
spec:
  size: 1
  local: true
  clowdenvironment:
    providers:
      db:
        mode: none
      inMemoryDb:
        mode: none
      kafka:
        mode: none
      logging:
        mode: none
      metrics:
        mode: none
        port: 9000
        path: /metrics
      objectStore:
        mode: none
      web:
        mode: none
        port: 8000
        privatePort: 10000
      featureFlags:
        mode: none
      testing:
        k8sAccessLevel: edit
        configAccess: environment
    resourceDefaults:
      limits:
        cpu: 300m
        memory: 256Mi
      requests:
        cpu: 30m
        memory: 128Mi
  limitrange:
    metadata:
      name: resource-limits
    spec:
      limits:
      - type: Container
        default:
          cpu: 200m
          memory: 512Mi
        defaultRequest:
          cpu: 100m
          memory: 384Mi
  resourcequotas:
    items:
    - metadata:
        name: compute-resources
      spec:
        hard:
          pods: "10"
