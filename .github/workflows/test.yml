name: Run Tests

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.adoc'
      - '.github/**'

permissions:
  contents: read

jobs:
  envtest:
    name: Envtest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v6
        name: Set up Go
        with:
          go-version: "1.25.7"

      - uses: actions/checkout@v6
        name: Checkout ENO

      - name: Download envtest binaries
        run: |
          make envtest
          ./bin/setup-envtest use 1.30.3 --bin-dir $HOME/.local/share/kubebuilder-envtest

      - name: Run tests
        run: make test
